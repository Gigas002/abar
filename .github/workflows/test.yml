name: Test and coverage

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Cairo/Pango (build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libcairo2-dev

      - name: Build cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests (default features)
        run: cargo test --workspace --verbose
      - name: Run tests (--all-features)
        run: cargo test --workspace --all-features --verbose
      - name: Run tests (--no-default-features)
        run: cargo test --workspace --no-default-features --verbose
      - name: Generate coverage report (libabar)
        run: |
          cargo llvm-cov --all-features -p libabar --lcov --output-path lcov-libabar.info
      - name: Generate coverage report (abar)
        run: |
          cargo llvm-cov --all-features -p abar --lcov --output-path lcov-abar.info
      - name: Upload libabar coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./lcov-libabar.info
          flags: libabar
          name: libabar
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload abar coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./lcov-abar.info
          flags: abar
          name: abar
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
