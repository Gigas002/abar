[base]
# font_name is required to run abar.
font_name = "NotoSans Nerd Font"
font_size = 16
# themes are looked-up at ~/.config/abar/themes, e.g. theme.toml in this directory
theme = "theme.toml"

# Modules:
# All modules are an opt-in cargo compile-time features.
# Built-in modules can have pre-defined settings, which can be tweaked in the config.
# Build-in modules list includes:
# - workspaces: exec-handler module; driven by a user script via stdout JSON
# - window: exec-handler module; driven by a user script via stdout JSON
# - mpris: exec-handler module; driven by a user script via stdout JSON (e.g. playerctl)
# - keyboard: exec-handler module; driven by a user script via stdout JSON
# - tray: exec-handler module; driven by a user script via stdout JSON (e.g. tray.sh using trayd+socat)
# - clock
#
# All modules include following events:
# - on_left_click
# - on_right_click
# - on_middle_click
# - on_scroll_up
# - on_scroll_down

# Custom modules:
# Custom modules are just a tiny icons on your bar with defined behavior.
# Create custom modules, by defining a new entries below.
# Each entry requires a unique name and an icon (FreeDesktop.org icon name).
# If icon is not specified or not found the panic is expected.
[modules]
custom = [
    { name = "system_info", icon = "gnome-system-monitor", on_left_click = "$TERMINAL -e btm" },
    { name = "leave", icon = "system-log-out", submenu = [
        { content = "sleep", action = "systemctl suspend" },
        { content = "logout", action = "hyprctl dispatch exit" },
        { content = "poweroff", action = "systemctl poweroff" },
    ] },
    { name = "audio", icon = "pavucontrol", on_left_click = "pavucontrol", on_scroll_up = "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+", on_scroll_down = "wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-" },
    { name = "bluetooth", icon = "blueman", on_left_click = "blueman-manager" },
    { name = "network", icon = "preferences-system-network", on_left_click = "nm-connection-editor" },
]

# Layout:
# Layout is a list of modules, each module is a string.
# Modules can be built-in or custom.
# Modules are displayed in the order they are defined.
# Modules are displayed on the left, center, and right sides of the bar.
[layout]
left = ["system_info", "workspaces", "mpris"]
center = ["window"]
right = [
    [
        "keyboard",
    ],
    [
        "tray",
        "clock",
        "bluetooth",
        "network",
        "audio",
        "leave",
    ],
]

[workspaces]
exec = "~/.config/abar/scripts/workspaces/hyprland.sh"
on_scroll_up = "hyprctl dispatch \"hl.dsp.focus({ workspace = 'e-1' })\""
on_scroll_down = "hyprctl dispatch \"hl.dsp.focus({ workspace = 'e+1' })\""

[window]
exec = "~/.config/abar/scripts/window/hyprland.sh"
# Maximum number of characters to show before truncating with "…". 0 = no limit.
max_length = 50
on_scroll_up = "hyprctl dispatch 'hl.dsp.window.cycle_next({ next = false })'"
on_scroll_down = "hyprctl dispatch 'hl.dsp.window.cycle_next({})'"

[keyboard]
exec = "~/.config/abar/scripts/keyboard/hyprland.sh"
on_left_click = "hyprctl switchxkblayout all next"

[mpris]
exec = "~/.config/abar/scripts/mpris/playerctl.sh"
# Maximum number of characters to show before truncating with "…". 0 = no limit.
max_length = 50
on_left_click = "playerctl play-pause"
on_right_click = "playerctl next"
on_scroll_up = "playerctl volume 0.05+"
on_scroll_down = "playerctl volume 0.05-"

[clock]
formats = [
    # 21:35 28.03.2026
    "%R %Z %d.%m.%Y",
]
# on_scroll_up / on_scroll_down: cycle through timezones
timezones = ["Asia/Tokyo", "Europe/Moscow"]
# launch calendar app on left click
on_left_click = "$TERMINAL -e calendar-tui"

[tray]
exec = "~/.config/abar/scripts/tray/tray.sh"
# on_left_click = "$TERMINAL -e tray-tui"
# When feed_id = true, the app_id of the clicked tray item is automatically
# appended as an argument to on_left_click, e.g. `tray-menu.sh <app_id>`.
feed_id = true
on_left_click = "~/.config/abar/scripts/tray/tray-menu.sh"
