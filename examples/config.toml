[base]
# Specifying font is a requirement to run abar, it will panic if not specified.
font = "NotoSans Nerd Font"
# themes are looked-up at ~/.config/abar/themes, e.g. theme.toml in this directory
theme = "theme.toml"

# Modules:
# All modules are an opt-in cargo compile-time features.
# Built-in modules can have pre-defined settings, which can be tweaked in the config. 
# Build-in modules list includes:
# - workspaces: depends on 3rd party implementation, e.g. hyprland-rs, niri-ipc, etc
# - window: same as above
# - mpris
# - keyboard
# - tray
# - clock
# 
# All modules include following events:
# - on_left_click
# - on_right_click
# - on_middle_click
# - on_scroll_up
# - on_scroll_down

# Custom modules:
# Custom modules are just a tiny icons on your bar with defined behavior.
# Create custom modules, by defining a new entries below.
# Each entry requires a unique name and an icon (FreeDesktop.org icon name).
# If icon is not specified or not found the panic is expected.
[custom_modules]
system_info = { icon = "system-info", on_left_click = "btm" }
wleave = { icon = "door", on_left_click = "wleave" }
audio = { icon = "audio", on_left_click = "pavucontrol", on_scroll_up = "pavucontrol -t 3", on_scroll_down = "pavucontrol -t 4" }
bluetooth = { icon = "bluetooth", on_left_click = "blueman-manager" }
network = { icon = "network", on_left_click = "nm-connection-editor" }

# Layout:
# Layout is a list of modules, each module is a string.
# Modules can be built-in or custom.
# Modules are displayed in the order they are defined.
# Modules are displayed on the left, center, and right sides of the bar.
[layout]
left = ["system_info", "workspaces"]
center = ["window"]
right = [
    [
        "keyboard",
    ],
    [
        "tray",
        "clock",
        "bluetooth",
        "network",
        "audio",
        "wleave",
    ],
]

[keyboard]
layouts = ["en-US", "ru-RU"]
# on_left_click: switch layout <- built-in functionality, overridable by the user

[clock]
# on_middle_click: format change <- built-in behavior, overridable by the user
formats = [
    # 21:35 28.03.2026
    "%R %Z %d.%m.%Y",
]
# on_right_click: timezone change <- built-in behavior, overridable by the user
timezones = ["Asia/Tokyo", "Europe/Moscow"]
# launch calendar app on left click
on_left_click = "rusti-cal"
